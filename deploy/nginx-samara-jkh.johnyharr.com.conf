# /etc/nginx/conf.d/samara-jkh.johnyharr.com.conf
# Проксирование на FastAPI (uvicorn 127.0.0.1:8000)

server {
    listen 80;
    listen [::]:80;
    server_name samara-jkh.johnyharr.com;

    client_max_body_size 10M;

    access_log /var/log/nginx/samara-jkh.access.log;
    error_log  /var/log/nginx/samara-jkh.error.log;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# После certbot появится блок listen 443 ssl — не удаляйте его вручную.
